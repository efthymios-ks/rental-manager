<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>401 - Unauthorized</title>
		<link
			rel="stylesheet"
			href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
		/>
	</head>

	<body
		class="bg-light d-flex align-items-center justify-content-center vh-100"
	>
		<div class="text-center">
			<h1 class="display-1 fw-bold text-danger">401</h1>
			<h4 class="mb-3">Unauthorized</h4>
			<p class="text-muted">You do not have access to this application.</p>
			<p class="text-muted small">
				Contact the administrator to request access.
			</p>
			<p class="text-muted small">
				Detected email: <strong id="detectedEmail"></strong>
			</p>
		</div>

		<script>
			const params = new URLSearchParams(window.location.search);
			document.getElementById("detectedEmail").textContent =
				params.get("email") || "(unknown)";
		</script>
	</body>
</html>
