<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>500 - Configuration Error</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  </head>
  <body class="bg-light d-flex align-items-center justify-content-center min-vh-100 py-5">
    <div class="text-center w-100" style="max-width: 760px;">
      <h1 class="display-1 fw-bold text-danger">500</h1>
      <h4 class="mb-2">Schema Configuration Error</h4>
      <p class="text-muted mb-1">The spreadsheet structure does not match the expected schema.</p>
      <p class="text-muted small mb-4">Fix the spreadsheet columns or update the schema, then reload.</p>
      <div id="issuesContainer" class="text-start d-none">
        <table class="table table-bordered table-sm bg-white shadow-sm">
          <thead class="table-danger">
            <tr>
              <th>Issue</th>
              <th>Sheet</th>
              <th>Missing Column</th>
            </tr>
          </thead>
          <tbody id="issuesBody"></tbody>
        </table>
      </div>
    </div>
    <script>
      try {
        const raw = sessionStorage.getItem("schemaIssues");
        if (raw) {
          const issues = JSON.parse(raw);
          sessionStorage.removeItem("schemaIssues");
          const tbody = document.getElementById("issuesBody");
          issues.forEach(({ issue, sheet, column }) => {
            const tr = document.createElement("tr");
            const isColumnIssue = column !== "—";
            tr.innerHTML = `
              <td>${issue}</td>
              <td>${sheet}</td>
              <td>${isColumnIssue ? `<code>${column}</code>` : "<span class='text-muted'>—</span>"}
            `;
            tbody.appendChild(tr);
          });
          document.getElementById("issuesContainer").classList.remove("d-none");
        }
      } catch {}
    </script>
  </body>
</html>
